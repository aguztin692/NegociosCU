<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Negocios CU</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css?v=4">
</head>

<body>

<header>
  <h1 class="logo-titulo">
    <img src="logoCU2.png" class="logo">
  </h1>
</header>

<nav>
  <button onclick="mostrarSeccion('todos')">Todos</button>
  <button onclick="mostrarSeccion('favoritos')">Favoritos ⭐</button>
</nav>

<div class="container">

  <input type="text" id="buscador" placeholder="Buscar negocio o producto...">
  
  <select id="filtroUbicacion">
  <option value="">Todas las ubicaciones</option>
  <option>Facultad de Ingeniería</option>
  <option>Facultad de Medicina</option>
  <option>Rectoría</option>
  <option>Área común</option>
  </select>

  <div class="acciones-home">
    <div class="accion" onclick="cambiarVista('productos')">
      <h3>🛍️ Vender ahora</h3>
      <p>Publica tus productos y empieza a vender dentro de CU</p>
    </div>

    <div class="accion" onclick="cambiarVista('pagina')">
      <h3>🌐 Crea tu página</h3>
      <p>Obtén tu propia página para tu negocio</p>
    </div>

    <div class="accion" onclick="cambiarVista('estudio')">
      <h3>📊 Estudio de mercado</h3>
      <p>Obtén datos y análisis para tomar decisiones inteligentes en tu emprendimiento</p>
    </div>
  </div>

  <button class="btn-main" onclick="abrirModal()">+ Agregar negocio</button>

  <div id="lista" class="grid"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="cerrarModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h2>Negocio</h2>

    <input type="text" id="nombre" placeholder="Nombre" required>

    <select id="categoria" required>
      <option value="">Categoría</option>
      <option>Comida</option>
      <option>Servicios</option>
      <option>Ropa</option>
      <option>Tecnología</option>
    </select>

    <select id="ubicacion" required>
      <option value="">Ubicación en CU</option>
      <option>Facultad de Ingeniería</option>
      <option>Facultad de Medicina</option>
      <option>Rectoría</option>
      <option>Área común</option>
    </select>

    <input type="text" id="horario" placeholder="Horario (ej: 8am - 2pm)">
    <div id="listaProductos"></div>
    <button type="button" onclick="agregarProducto()">+ Agregar producto</button>
    <input type="text" id="contacto" placeholder="Contacto" required>
    <input type="file" id="imagen">

    <button onclick="guardar()">Guardar</button>
    <button onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<div id="detalle" class="detalle" onclick="cerrarDetalle()">
  <div class="detalle-content" onclick="event.stopPropagation()">
  <button onclick="event.stopPropagation(); cerrarDetalle()">⬅ Volver</button> 
  <div id="detalleInfo"></div>
  </div>
</div> 

<script src="app.js"></script>


</body>
</html>
